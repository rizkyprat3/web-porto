<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <radialGradient id="sky" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1a2238"/>
      <stop offset="100%" stop-color="#06080e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9a3c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff9a3c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14507e"/>
      <stop offset="100%" stop-color="#0b2440"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#sky)"/>
  <!-- laut -->
  <rect y="250" width="640" height="110" fill="url(#sea)"/>
  <path d="M0 252 Q80 246 160 252 T320 252 T480 252 T640 252 V360 H0 Z" fill="#0d2b52" opacity="0.7"/>
  <!-- benua siluet -->
  <path d="M-20 260 L60 210 L120 225 L180 175 L240 195 L300 150 L360 185 L420 160 L480 200 L540 180 L620 230 L660 260 Z" fill="#101820"/>
