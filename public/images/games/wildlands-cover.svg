  <path d="M300 150 L312 168 L288 168 Z" fill="#e3e9ee"/>
  <path d="M420 160 L448 200 L392 200 Z" fill="#232b38"/>
  <path d="M420 160 L430 175 L410 175 Z" fill="#cdd6de"/>
  <!-- menara bara -->
  <g>
    <circle cx="180" cy="128" r="46" fill="url(#glow)"/>
    <rect x="172" y="130" width="16" height="60" fill="#3a3f4a" transform="rotate(-2 180 160)"/>
    <rect x="168" y="124" width="24" height="8" fill="#2e333d"/>
    <path d="M180 96 L190 124 L170 124 Z" fill="#ff9a3c"/>
    <path d="M180 106 L186 124 L174 124 Z" fill="#ffd15c"/>
  </g>
  <!-- lima pelita: titik cahaya kecil tersebar -->
  <circle cx="70" cy="235" r="3" fill="#bfe8ff" opacity="0.9"/>
  <circle cx="255" cy="205" r="3" fill="#9fdc6f" opacity="0.9"/>
  <circle cx="330" cy="270" r="3" fill="#e8ecff" opacity="0.9"/>
  <circle cx="470" cy="215" r="3" fill="#ff7a3a" opacity="0.9"/>
  <circle cx="415" cy="172" r="3" fill="#bcd8ff" opacity="0.9"/>
  <!-- bintang -->
  <g fill="#e8ddc0" opacity="0.5">
    <circle cx="60" cy="40" r="1.2"/><circle cx="140" cy="70" r="1"/><circle cx="240" cy="35" r="1.4"/>
    <circle cx="340" cy="60" r="1"/><circle cx="430" cy="30" r="1.2"/><circle cx="520" cy="55" r="1"/>
    <circle cx="590" cy="90" r="1.3"/><circle cx="480" cy="95" r="0.9"/><circle cx="90" cy="105" r="1"/>
  </g>
  <!-- judul -->
  <text x="320" y="315" text-anchor="middle" font-family="Courier New, monospace" font-size="42" font-weight="bold" fill="#ffd7a0" letter-spacing="14">WILDLANDS</text>
  <text x="320" y="338" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="#8a8fa5" letter-spacing="3">BENUA YANG DILUPAKAN · LIMA PELITA</text>
</svg>
